<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="5K Tracker">
<title>Sub-20 5K Training Tracker</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%230E1113'/%3E%3Ccircle cx='50' cy='50' r='30' fill='none' stroke='%23E0432B' stroke-width='6'/%3E%3Cpath d='M50 30 L50 50 L65 60' stroke='%233E7CB1' stroke-width='6' fill='none' stroke-linecap='round'/%3E%3C/svg%3E">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

  :root {
    --bg: #0E1113;
    --surface: #171B1E;
    --border: #232A30;
    --run: #E0432B;
    --run-light: #F0725E;
    --lift: #3E7CB1;
    --lift-light: #7EB3DE;
    --rest: #9198A0;
    --race: #D9A83A;
    --race-light: #E9C468;
    --mobility: #8B6FD9;
    --mobility-light: #B3A0EA;
    --success: #4CAF6D;
  }

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: #fff;
    font-family: 'IBM Plex Sans', system-ui, sans-serif;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    padding-top: env(safe-area-inset-top);
    padding-bottom: env(safe-area-inset-bottom);
  }
  .display { font-family: 'Oswald', sans-serif; }
  .mono { font-family: 'IBM Plex Mono', monospace; }

  input[type="checkbox"].track-check {
    appearance: none; -webkit-appearance: none;
    width: 26px; height: 26px; border-radius: 6px;
    border: 2px solid #3A4148; background: var(--surface); cursor: pointer;
    position: relative; flex-shrink: 0; transition: all .15s ease;
  }
  input[type="checkbox"].track-check:checked { background: var(--success); border-color: var(--success); }
  input[type="checkbox"].track-check:checked::after {
    content: ''; position: absolute; left: 8px; top: 3px;
    width: 6px; height: 12px; border: solid var(--bg);
    border-width: 0 2.5px 2.5px 0; transform: rotate(45deg);
  }

  input[type="text"], input[type="number"], textarea {
    background: #F1F2F0 !important; color: #111315 !important;
    -webkit-text-fill-color: #111315 !important;
    -webkit-appearance: none; appearance: none;
    border: none; border-radius: 6px; padding: 6px 8px;
    font-size: 14px; width: 100%; caret-color: #111315;
  }
  input::placeholder, textarea::placeholder { color: rgba(17,19,21,0.45) !important; }
  textarea { resize: none; font-family: 'IBM Plex Sans', sans-serif; }

  button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

  .header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(14,17,19,0.95); backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
  }
  .progress-track { height: 6px; border-radius: 4px; background: #1F252A; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--run), var(--race)); transition: width .3s; }

  .tabs { display: flex; border-bottom: 1px solid var(--border); padding: 0 20px; }
  .tab-btn {
    display: flex; align-items: center; gap: 6px; padding: 12px; font-size: 14px; font-weight: 500;
    border-bottom: 2px solid transparent; color: rgba(255,255,255,0.7);
  }
  .tab-btn.active { border-color: var(--run); color: #fff; }

  .day-card { border-radius: 12px; background: var(--surface); border: 1px solid var(--border); overflow: hidden; display: flex; margin-bottom: 12px; }
  .day-bar { width: 6px; flex-shrink: 0; }
  .day-body { flex: 1; padding: 14px; }
  .badge { font-size: 10px; font-weight: 600; padding: 2px 6px; border-radius: 4px; border: 1px solid; text-transform: uppercase; letter-spacing: .05em; }
  .field-wrap { display: flex; align-items: center; gap: 6px; background: var(--bg); border-radius: 8px; padding: 6px 9px; border: 1px solid var(--border); flex: 1; }
  .icon-btn { padding: 8px; border-radius: 8px; border: 1px solid var(--border); color: rgba(255,255,255,0.5); }
  .icon-btn.active { border-color: rgba(217,168,58,0.4); color: var(--race); }
  .nav-btn { padding: 8px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); }
  .nav-btn:disabled { opacity: .3; }
  .copy-btn { width: 100%; display: flex; align-items: center; justify-content: center; gap: 8px; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); padding: 10px; font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.7); margin-bottom: 16px; }
  .checkin-card { border-radius: 12px; background: var(--surface); border: 1px solid var(--border); padding: 14px; margin-bottom: 16px; }
  .stat-card { border-radius: 12px; background: var(--surface); border: 1px solid var(--border); padding: 12px; text-align: center; }
  .mode-toggle { margin-top: 12px; width: 100%; display: flex; align-items: center; justify-content: space-between; border-radius: 8px; background: var(--surface); border: 1px solid var(--border); padding: 8px 12px; }
  .warn-banner { background: rgba(217,168,58,0.15); border-bottom: 1px solid rgba(217,168,58,0.4); padding: 10px 20px; font-size: 12px; color: var(--race-light); text-align: center; }
  .export-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; border-radius: 8px; background: linear-gradient(90deg, var(--run), var(--race)); padding: 12px; font-size: 14px; font-weight: 600; color: #fff; margin-bottom: 12px; }
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ================= SCHEDULE LOGIC (ported from tracker) ================= */
const START_DATE = new Date(2026, 6, 5); // Sunday 5 July 2026

function addDays(date, days) { const d = new Date(date); d.setDate(d.getDate() + days); return d; }

function phaseForWeek(w) {
  if (w <= 2) return { num: 1, name: "Reacclimation" };
  if (w <= 14) return { num: 2, name: "Threshold & Volume Build" };
  if (w <= 20) return { num: 3, name: "Sharpen" };
  return { num: 4, name: "Taper & Race" };
}

function longRunDetail(week) {
  const phase = phaseForWeek(week).num;
  if (phase === 1) return `${50 + (week - 1) * 10} min easy, no pace pressure`;
  if (phase === 2) return `${Math.min(100, Math.round(65 + (week - 3) * 3))} min easy`;
  if (phase === 3) {
    if (week <= 16) return "4mi easy + 1mi at goal 5K pace";
    if (week <= 18) return "4mi easy + 2mi at goal 5K pace";
    return "3mi easy + 3mi at goal 5K pace";
  }
  return "";
}
function thresholdDetail(week) {
  if (week <= 6) return "3 x 8 min comfortably hard, 2 min jog recovery";
  if (week <= 10) return "3 x 10 min comfortably hard, 2 min jog recovery";
  return "4 x 10 min comfortably hard, 90s jog recovery";
}
function hillDetail(phase) {
  if (phase === 1) return "8 x 1 min hill sprints @ Zone 5, jog back recovery";
  if (phase === 2) return "10 x 1 min hill sprints @ Zone 5, jog back recovery";
  return "6-8 x 1 min hill sprints, maintain intensity";
}
function vo2Detail(week) {
  if (week <= 16) return "6 x 400m at 5K pace, 90s jog recovery";
  if (week <= 18) return "8 x 400m at 5K pace or slightly faster, 90s jog recovery";
  return "6 x 800m at 5K goal pace, 2 min jog recovery";
}

const LIFT_CONTENT = {
  weighted: {
    A: { title: "Lift A", detail: "Squat 3x5 / Bench 3x5 / Pull-ups 3x(max-2) / Plank 3x45s" },
    B: { title: "Lift B", detail: "Deadlift 1x5 / OHP 3x5 / Barbell Row 3x8 / Curls+Triceps 2-3 sets" },
    C: { title: "Lift C", detail: "Goblet Squat 3x5-8 / Incline DB Press 3x8 / Pull-ups 3xmax / Lateral raises + core" },
    TAPER: { title: "Light Lift", detail: "Reduced volume, keep intensity, cut sets ~40%" },
  },
  bodyweight: {
    A: { title: "Lift A (Bodyweight)", detail: "Bodyweight Squat 3x15-20 / Push-ups 3xmax / Pull-ups 3x(max-2) / Plank 3x45s" },
    B: { title: "Lift B (Bodyweight)", detail: "Single-Leg Glute Bridge 3x12-15/side / Pike Push-ups 3x8-12 / Wide-Grip Pull-ups 3x8 / Dips or Diamond Push-ups 2-3 sets" },
    C: { title: "Lift C (Bodyweight)", detail: "Bulgarian Split Squat 3x8-10/side / Decline Push-ups 3xmax / Chin-ups 3xmax / Side Plank + Superman Holds" },
    TAPER: { title: "Light Lift (Bodyweight)", detail: "Easy bodyweight squats, push-ups, pull-ups — stay sharp, don't grind" },
  },
};

function getLiftContent(liftKey, bodyweightMode, reduced, comboRun) {
  const base = (bodyweightMode ? LIFT_CONTENT.bodyweight : LIFT_CONTENT.weighted)[liftKey];
  let title = base.title, detail = base.detail;
  if (reduced) { title += " (reduced)"; detail = "2 working sets each — " + detail; }
  if (comboRun) { title += " + Easy Run"; detail += " — then optional 20-30 min easy run"; }
  return { title, detail };
}

const MOBILITY_ROTATION = [
  { title: "Feet & Ankle Mobility", detail: "10 min: towel scrunches, ankle circles x20 each way, calf/soleus wall stretch 2x30s" },
  { title: "Knee & Hip Mobility", detail: "10 min: hip flexor stretch 2x30s/side, knee CARs, 90/90 hip switches x10" },
  { title: "Shoulder & Wrist Mobility", detail: "10 min: wrist circles + stretch 2x30s, shoulder dislocates x15, thoracic rotations x10/side" },
  { title: "Feet & Ankle Mobility", detail: "10 min: single-leg balance x30s/side, ankle alphabet, big toe stretch" },
  { title: "Shoulder & Wrist Mobility", detail: "10 min: band pull-aparts x15, wrist flexor/extensor stretch, cat-cow x10" },
  { title: "Ankle & Calf Mobility", detail: "10 min: slow calf raises x15, ankle dorsiflexion stretch, foam roll calves/feet" },
  { title: "Full-Body Flow", detail: "10-15 min: world's greatest stretch x5/side, hip circles, shoulder rolls, easy static stretch" },
];

function buildWeek(week) {
  const phase = phaseForWeek(week).num;
  let days;
  if (phase === 1) {
    days = [
      { type: "run", title: "Long Run", detail: longRunDetail(week) },
      { type: "run", title: "Easy Run", detail: "25-30 min recovery pace" },
      { type: "lift", liftKey: "A" },
      { type: "run", title: "Easy Run", detail: "30-35 min conversational" },
      { type: "lift", liftKey: "B" },
      { type: "run", title: "Hill Sprints", detail: hillDetail(phase) },
      { type: "lift", liftKey: "C", comboRun: true },
    ];
  } else if (phase === 2) {
    days = [
      { type: "run", title: "Long Run", detail: longRunDetail(week) },
      { type: "run", title: "Easy Run", detail: "30-35 min recovery" },
      { type: "lift", liftKey: "A" },
      { type: "run", title: "Threshold Run", detail: thresholdDetail(week) },
      { type: "lift", liftKey: "B" },
      { type: "run", title: "Hill Sprints", detail: hillDetail(phase) },
      { type: "lift", liftKey: "C", comboRun: true },
    ];
  } else if (phase === 3) {
    days = [
      { type: "run", title: "Race-Pace Long Run", detail: longRunDetail(week) },
      { type: "run", title: "Easy Run", detail: "25-30 min" },
      { type: "lift", liftKey: "A", reduced: true },
      { type: "run", title: "VO2max Intervals", detail: vo2Detail(week) },
      { type: "lift", liftKey: "B", reduced: true },
      { type: "run", title: "Hill Sprints", detail: hillDetail(phase) },
      { type: "lift", liftKey: "C", reduced: true, comboRun: true },
    ];
  } else {
    const offset = week - 20;
    if (offset === 1) {
      days = [
        { type: "run", title: "Long Run", detail: "50-60 min easy" },
        { type: "run", title: "Easy Run", detail: "25 min" },
        { type: "lift", liftKey: "A", reduced: true },
        { type: "run", title: "Threshold Touch", detail: "2 x 8 min comfortably hard" },
        { type: "lift", liftKey: "B", reduced: true },
        { type: "run", title: "Hill Sprints", detail: "6 x 1 min hill sprints" },
        { type: "lift", liftKey: "C", reduced: true, comboRun: true },
      ];
    } else if (offset === 2) {
      days = [
        { type: "race", title: "Tune-Up Race", detail: "Race or hard time trial before the sharp taper" },
        { type: "run", title: "Easy Run", detail: "20 min" },
        { type: "lift", liftKey: "TAPER" },
        { type: "run", title: "Short Intervals", detail: "4 x 3 min at 5K pace" },
        { type: "lift", liftKey: "TAPER" },
        { type: "rest", title: "Rest or Very Easy", detail: "Optional 15 min shakeout" },
        { type: "lift", liftKey: "TAPER", comboRun: true },
      ];
    } else if (offset === 3) {
      days = [
        { type: "run", title: "Easy Run", detail: "40 min" },
        { type: "run", title: "Easy Run", detail: "20 min" },
        { type: "lift", liftKey: "TAPER" },
        { type: "run", title: "Sharpening Touch", detail: "3 x 2 min at 5K pace" },
        { type: "lift", liftKey: "TAPER" },
        { type: "run", title: "Shakeout", detail: "15 min, very easy" },
        { type: "rest", title: "Rest", detail: "Full rest" },
      ];
    } else {
      days = [
        { type: "run", title: "Easy Run", detail: "20 min" },
        { type: "lift", liftKey: "TAPER" },
        { type: "run", title: "Short Strides", detail: "4 x 30s at 5K pace" },
        { type: "rest", title: "Rest", detail: "Full rest" },
        { type: "run", title: "Shakeout", detail: "15 min, very easy" },
        { type: "rest", title: "Rest", detail: "Full rest before the race" },
        { type: "race", title: "GOAL RACE — Sub-20 5K", detail: "This is the one. Trust the training." },
      ];
    }
  }
  if (week === 1) days[0] = { type: "race", title: "5K Time Trial (Baseline)", detail: "All-out effort — this sets your true starting point" };
  if (week === 8) days[0] = { type: "race", title: "5K Time Trial", detail: "Hard parkrun or timed effort — checks early threshold adaptation" };
  if (week === 14) days[0] = { type: "race", title: "5K Time Trial (Checkpoint)", detail: "This decides if Phase 3 starts on schedule" };
  return days;
}

const TOTAL_WEEKS = 24;
const SCHEDULE = Array.from({ length: TOTAL_WEEKS }, (_, wi) => {
  const week = wi + 1;
  const days = buildWeek(week).map((d, i) => {
    const date = addDays(START_DATE, wi * 7 + i);
    return {
      ...d, date,
      dateLabel: date.toLocaleDateString("en-GB", { day: "2-digit", month: "short" }),
      weekday: date.toLocaleDateString("en-GB", { weekday: "short" }),
      mobility: MOBILITY_ROTATION[i],
    };
  });
  return { week, phase: phaseForWeek(week), days };
});

const TYPE_STYLE = {
  run: { bar: "var(--run)", badgeBg: "rgba(224,67,43,0.15)", badgeText: "var(--run-light)", badgeBorder: "rgba(224,67,43,0.3)", label: "RUN" },
  lift: { bar: "var(--lift)", badgeBg: "rgba(62,124,177,0.15)", badgeText: "var(--lift-light)", badgeBorder: "rgba(62,124,177,0.3)", label: "LIFT" },
  rest: { bar: "var(--rest)", badgeBg: "rgba(145,152,160,0.15)", badgeText: "rgba(255,255,255,0.7)", badgeBorder: "rgba(145,152,160,0.3)", label: "REST" },
  race: { bar: "var(--race)", badgeBg: "rgba(217,168,58,0.15)", badgeText: "var(--race-light)", badgeBorder: "rgba(217,168,58,0.3)", label: "RACE" },
  mobility: { bar: "var(--mobility)", badgeBg: "rgba(139,111,217,0.15)", badgeText: "var(--mobility-light)", badgeBorder: "rgba(139,111,217,0.3)", label: "MOBILITY" },
};

/* ================= STATE & STORAGE (localStorage — fully offline) ================= */
const STORAGE_KEY = "sub20-tracker-data-v1";
let state = { mode: "bodyweight", logs: {}, metrics: {} };
let currentWeek = 1;
let currentTab = "week";
let expandedDay = null;
let copiedKey = null;
let toastTimeout = null;

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) state = JSON.parse(raw);
  } catch (e) { console.error("Load failed", e); }
}
function saveState() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    showToast("✓ saved");
  } catch (e) {
    showToast("⚠ save failed — storage may be full or blocked");
  }
}
function showToast(msg) {
  const el = document.getElementById("toast");
  if (!el) return;
  el.textContent = msg;
  el.style.opacity = "1";
  clearTimeout(toastTimeout);
  toastTimeout = setTimeout(() => { el.style.opacity = "0"; }, 1400);
}

function keyFor(w, i) { return `${w}-${i}`; }
function mobKeyFor(w, i) { return `${w}-${i}-mob`; }

function updateEntry(dayIdx, patch) {
  const k = keyFor(currentWeek, dayIdx);
  state.logs[k] = { ...(state.logs[k] || {}), ...patch };
  saveState();
  render();
}
function updateEntryField(dayIdx, patch) {
  // For continuous text/number typing — save silently, no re-render, so the keyboard stays open
  const k = keyFor(currentWeek, dayIdx);
  state.logs[k] = { ...(state.logs[k] || {}), ...patch };
  saveState();
}
function updateMobility(dayIdx, patch) {
  const k = mobKeyFor(currentWeek, dayIdx);
  state.logs[k] = { ...(state.logs[k] || {}), ...patch };
  saveState();
  render();
}
function updateMetric(patch) {
  state.metrics[currentWeek] = { ...(state.metrics[currentWeek] || {}), ...patch };
  saveState();
}
function toggleMode() {
  state.mode = state.mode === "weighted" ? "bodyweight" : "weighted";
  saveState();
  render();
}
function setTab(t) { currentTab = t; expandedDay = null; render(); }
function setWeek(w) { currentWeek = Math.max(1, Math.min(TOTAL_WEEKS, w)); expandedDay = null; render(); }
function toggleExpand(i) { expandedDay = expandedDay === i ? null : i; render(); }

/* ================= WEEK SUMMARY / EXPORT ================= */
function buildWeekSummary(w) {
  const wd = SCHEDULE[w - 1];
  const m = state.metrics[w] || {};
  const bwMode = state.mode !== "weighted";
  const lines = [`WEEK ${w} — ${wd.days[0].dateLabel} to ${wd.days[6].dateLabel} (Phase ${wd.phase.num}: ${wd.phase.name})`];
  wd.days.forEach((d, i) => {
    const entry = state.logs[keyFor(w, i)] || {};
    const content = d.type === "lift" ? getLiftContent(d.liftKey, bwMode, d.reduced, d.comboRun) : d;
    const status = d.type === "rest" ? "-" : entry.completed ? "DONE" : "missed";
    const metricBit = entry.time ? ` | ${entry.time}` : entry.weight ? ` | ${entry.weight}kg` : entry.reps ? ` | ${entry.reps}` : "";
    const commentBit = entry.comment ? ` | note: ${entry.comment}` : "";
    const mob = state.logs[mobKeyFor(w, i)] || {};
    const mobBit = mob.completed ? ` | mobility: done` : "";
    lines.push(`${d.weekday} ${d.dateLabel} — ${content.title} [${status}]${metricBit}${commentBit}${mobBit}`);
  });
  if (m.bodyweight || m.vo2max) lines.push(`Bodyweight: ${m.bodyweight ? m.bodyweight + "kg" : "-"} | VO2max: ${m.vo2max || "-"}`);
  return lines.join("\n");
}

function copyWeekSummary(w) {
  const text = buildWeekSummary(w);
  navigator.clipboard.writeText(text).then(() => {
    copiedKey = w;
    render();
    setTimeout(() => { copiedKey = null; render(); }, 2000);
  }).catch(() => showToast("⚠ couldn't copy — select text manually"));
}

function exportAllData() {
  const lines = ["SUB-20 5K TRAINING LOG — FULL EXPORT", `Generated: ${new Date().toLocaleString("en-GB")}`, ""];
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const wd = SCHEDULE[w - 1];
    const hasData = wd.days.some((d, i) => {
      const e = state.logs[keyFor(w, i)];
      const m = state.logs[mobKeyFor(w, i)];
      return (e && (e.completed || e.comment || e.time || e.weight || e.reps)) || (m && m.completed);
    }) || state.metrics[w];
    if (hasData) { lines.push(buildWeekSummary(w)); lines.push(""); }
  }
  const text = lines.join("\n");
  const blob = new Blob([text], { type: "text/plain" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = `training-log-export-${new Date().toISOString().slice(0,10)}.txt`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showToast("✓ exported");
}

function copyAllData() {
  const lines = ["SUB-20 5K TRAINING LOG — FULL EXPORT", `Generated: ${new Date().toLocaleString("en-GB")}`, ""];
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const wd = SCHEDULE[w - 1];
    const hasData = wd.days.some((d, i) => {
      const e = state.logs[keyFor(w, i)];
      const m = state.logs[mobKeyFor(w, i)];
      return (e && (e.completed || e.comment || e.time || e.weight || e.reps)) || (m && m.completed);
    }) || state.metrics[w];
    if (hasData) { lines.push(buildWeekSummary(w)); lines.push(""); }
  }
  navigator.clipboard.writeText(lines.join("\n")).then(() => showToast("✓ all data copied")).catch(() => showToast("⚠ couldn't copy"));
}

/* ================= RENDERING ================= */
function esc(s) { const d = document.createElement("div"); d.textContent = s || ""; return d.innerHTML; }

function renderHeader() {
  const wd = SCHEDULE[currentWeek - 1];
  const relevant = wd.days.filter(d => d.type !== "rest");
  const done = wd.days.filter((d, i) => d.type !== "rest" && state.logs[keyFor(currentWeek, i)]?.completed).length;
  let totalDone = 0, totalCount = 0;
  for (let w = 1; w <= currentWeek; w++) {
    SCHEDULE[w-1].days.forEach((d, i) => { if (d.type === "rest") return; totalCount++; if (state.logs[keyFor(w,i)]?.completed) totalDone++; });
  }
  const pct = totalCount ? Math.round((totalDone/totalCount)*100) : 0;
  const bwMode = state.mode !== "weighted";
  return `
    <div class="header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <div>
          <div class="display" style="font-size:11px;letter-spacing:0.2em;color:rgba(255,255,255,0.7);text-transform:uppercase;">Training Log</div>
          <div class="display" style="font-size:30px;font-weight:600;line-height:1;margin-top:4px;">WK ${String(currentWeek).padStart(2,"0")} <span style="color:rgba(255,255,255,0.5);">/ ${TOTAL_WEEKS}</span></div>
          <div class="mono" style="font-size:12px;color:rgba(255,255,255,0.7);margin-top:4px;">${wd.days[0].dateLabel} – ${wd.days[6].dateLabel}</div>
        </div>
        <div style="text-align:right;">
          <div style="font-size:11px;color:rgba(255,255,255,0.7);text-transform:uppercase;">Phase ${wd.phase.num}</div>
          <div class="display" style="font-size:17px;font-weight:500;color:var(--run);">${esc(wd.phase.name)}</div>
        </div>
      </div>
      <div class="progress-track"><div class="progress-fill" style="width:${(currentWeek/TOTAL_WEEKS)*100}%"></div></div>
      <div style="display:flex;justify-content:space-between;margin-top:8px;font-size:12px;color:rgba(255,255,255,0.7);" class="mono">
        <span>Week logged: ${done}/${relevant.length}</span>
        <span>Overall: ${pct}%</span>
      </div>
      <button class="mode-toggle" onclick="toggleMode()">
        <span style="display:flex;align-items:center;gap:8px;">
          <span>🏋️</span>
          <span style="font-size:12px;">
            <span style="${bwMode ? 'color:rgba(255,255,255,0.7)' : 'color:#fff;font-weight:500'}">Weighted</span>
            <span style="color:rgba(255,255,255,0.5);margin:0 6px;">/</span>
            <span style="${bwMode ? 'color:#fff;font-weight:500' : 'color:rgba(255,255,255,0.7)'}">Bodyweight</span>
          </span>
        </span>
        <span style="color:rgba(255,255,255,0.5);">⟲</span>
      </button>
      <div id="toast" style="text-align:center;font-size:10px;color:var(--success);margin-top:6px;height:14px;opacity:0;transition:opacity .2s;" class="mono"></div>
    </div>
  `;
}

function renderTabs() {
  return `
    <div class="tabs">
      <button class="tab-btn ${currentTab==='week'?'active':''}" onclick="setTab('week')">📅 This Week</button>
      <button class="tab-btn ${currentTab==='history'?'active':''}" onclick="setTab('history')">📊 History</button>
      <button class="tab-btn ${currentTab==='review'?'active':''}" onclick="setTab('review')">📈 Review</button>
    </div>
  `;
}

function renderWeekTab() {
  const wd = SCHEDULE[currentWeek - 1];
  const bwMode = state.mode !== "weighted";
  const m = state.metrics[currentWeek] || {};

  let html = `
    <div style="padding:16px;">
      <div class="checkin-card">
        <div style="font-size:11px;text-transform:uppercase;letter-spacing:0.05em;color:rgba(255,255,255,0.5);margin-bottom:10px;">Weekly Check-in (from Apple Watch)</div>
        <div style="display:flex;gap:10px;">
          <div class="field-wrap">
            <span>⚖️</span>
            <input type="number" inputmode="decimal" placeholder="bodyweight" value="${esc(m.bodyweight||'')}" oninput="updateMetric({bodyweight:this.value})">
            <span style="font-size:11px;color:rgba(255,255,255,0.5);" class="mono">kg</span>
          </div>
          <div class="field-wrap">
            <span>🫁</span>
            <input type="number" inputmode="decimal" placeholder="VO2 max" value="${esc(m.vo2max||'')}" oninput="updateMetric({vo2max:this.value})">
          </div>
        </div>
      </div>

      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
        <button class="nav-btn" onclick="setWeek(${currentWeek-1})" ${currentWeek===1?'disabled':''}>‹</button>
        <div class="mono" style="font-size:12px;color:rgba(255,255,255,0.7);">Week ${currentWeek} of ${TOTAL_WEEKS}</div>
        <button class="nav-btn" onclick="setWeek(${currentWeek+1})" ${currentWeek===TOTAL_WEEKS?'disabled':''}>›</button>
      </div>

      <button class="copy-btn" onclick="copyWeekSummary(${currentWeek})">
        ${copiedKey===currentWeek ? '<span style="color:var(--success);">✓ Copied — paste into chat with Claude</span>' : '<span>📋 Copy Week Summary</span>'}
      </button>
  `;

  wd.days.forEach((d, i) => {
    const entry = state.logs[keyFor(currentWeek, i)] || {};
    const mobEntry = state.logs[mobKeyFor(currentWeek, i)] || {};
    const style = TYPE_STYLE[d.type];
    const content = d.type === "lift" ? getLiftContent(d.liftKey, bwMode, d.reduced, d.comboRun) : d;
    const isOpen = expandedDay === i;

    let fieldHtml = "";
    if (d.type === "lift" && !bwMode) {
      fieldHtml = `<div class="field-wrap"><span>🏋️</span><input type="number" inputmode="decimal" placeholder="top set weight" value="${esc(entry.weight||'')}" oninput="updateEntryField(${i},{weight:this.value})"><span style="font-size:11px;color:rgba(255,255,255,0.5);" class="mono">kg</span></div>`;
    } else if (d.type === "lift" && bwMode) {
      fieldHtml = `<div class="field-wrap"><span>🏋️</span><input type="text" placeholder="reps / notes e.g. 3x18" value="${esc(entry.reps||'')}" oninput="updateEntryField(${i},{reps:this.value})"></div>`;
    } else if (d.type === "run" || d.type === "race") {
      fieldHtml = `<div class="field-wrap"><span>⏱️</span><input type="text" placeholder="time / result" value="${esc(entry.time||'')}" oninput="updateEntryField(${i},{time:this.value})"></div>`;
    } else {
      fieldHtml = `<div style="flex:1;"></div>`;
    }

    html += `
      <div class="day-card">
        <div class="day-bar" style="background:${style.bar}"></div>
        <div class="day-body">
          <div style="display:flex;align-items:flex-start;gap:12px;">
            <button onclick="updateEntry(${i},{completed:${!entry.completed}})" style="margin-top:2px;">
              <input type="checkbox" class="track-check" ${entry.completed?'checked':''} ${d.type==='rest'?'disabled':''} onclick="return false;">
            </button>
            <div style="flex:1;min-width:0;">
              <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;">
                <span class="mono" style="font-size:11px;color:rgba(255,255,255,0.7);text-transform:uppercase;">${d.weekday} ${d.dateLabel}</span>
                <span class="badge" style="background:${style.badgeBg};color:${style.badgeText};border-color:${style.badgeBorder};">${style.label}</span>
              </div>
              <div class="display" style="font-size:16px;font-weight:500;margin-top:2px;${entry.completed?'text-decoration:line-through;color:rgba(255,255,255,0.5);':''}">${esc(content.title)}</div>
              <div style="font-size:14px;color:rgba(255,255,255,0.7);margin-top:2px;">${esc(content.detail)}</div>

              <div style="display:flex;align-items:center;gap:8px;margin-top:10px;">
                ${fieldHtml}
                <button class="icon-btn ${entry.comment?'active':''}" onclick="toggleExpand(${i})">💬</button>
              </div>

              ${isOpen ? `<textarea placeholder="Comments — how did it feel?" rows="2" style="margin-top:8px;" oninput="updateEntryField(${i},{comment:this.value})">${esc(entry.comment||'')}</textarea>` : ''}

              <div style="display:flex;align-items:flex-start;gap:10px;margin-top:12px;padding-top:12px;border-top:1px solid var(--border);">
                <button onclick="updateMobility(${i},{completed:${!mobEntry.completed}})" style="margin-top:2px;">
                  <input type="checkbox" class="track-check" ${mobEntry.completed?'checked':''} onclick="return false;">
                </button>
                <div style="flex:1;min-width:0;">
                  <div style="display:flex;align-items:center;gap:8px;">
                    <span class="badge" style="background:${TYPE_STYLE.mobility.badgeBg};color:${TYPE_STYLE.mobility.badgeText};border-color:${TYPE_STYLE.mobility.badgeBorder};">MOBILITY</span>
                    <span style="font-size:14px;font-weight:500;${mobEntry.completed?'text-decoration:line-through;color:rgba(255,255,255,0.5);':''}">${esc(d.mobility.title)}</span>
                  </div>
                  <div style="font-size:12px;color:rgba(255,255,255,0.5);margin-top:2px;">${esc(d.mobility.detail)}</div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    `;
  });

  html += `</div>`;
  return html;
}

function renderHistoryTab() {
  let totalDone = 0, totalCount = 0;
  for (let w = 1; w <= currentWeek; w++) {
    SCHEDULE[w-1].days.forEach((d, i) => { if (d.type === "rest") return; totalCount++; if (state.logs[keyFor(w,i)]?.completed) totalDone++; });
  }
  const pct = totalCount ? Math.round((totalDone/totalCount)*100) : 0;
  const bwMode = state.mode !== "weighted";

  const rows = [];
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    SCHEDULE[w-1].days.forEach((d, i) => {
      const entry = state.logs[keyFor(w, i)];
      if (entry && (entry.completed || entry.comment || entry.time || entry.weight || entry.reps)) {
        const content = d.type === "lift" ? getLiftContent(d.liftKey, bwMode, d.reduced, d.comboRun) : d;
        rows.push({ week: w, weekday: d.weekday, dateLabel: d.dateLabel, title: content.title, type: d.type, ...entry });
      }
    });
  }
  rows.reverse();

  let html = `
    <div style="padding:16px;">
      <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:20px;">
        <div class="stat-card"><div class="display" style="font-size:22px;font-weight:600;color:var(--success);">${totalDone}</div><div style="font-size:10px;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-top:2px;">Completed</div></div>
        <div class="stat-card"><div class="display" style="font-size:22px;font-weight:600;">${pct}%</div><div style="font-size:10px;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-top:2px;">Adherence</div></div>
        <div class="stat-card"><div class="display" style="font-size:22px;font-weight:600;color:var(--run);">🔥 ${currentWeek}</div><div style="font-size:10px;color:rgba(255,255,255,0.7);text-transform:uppercase;margin-top:2px;">Current Week</div></div>
      </div>
      <button class="export-btn" onclick="exportAllData()">⬇ Export All Data (.txt file)</button>
      <button class="copy-btn" onclick="copyAllData()">📋 Copy All Data to Clipboard</button>
  `;

  if (rows.length === 0) {
    html += `<div style="text-align:center;color:rgba(255,255,255,0.5);padding:40px 0;font-size:14px;">Nothing logged yet — tick off sessions in "This Week" and they'll show up here.</div>`;
  } else {
    rows.forEach(row => {
      const style = TYPE_STYLE[row.type];
      html += `
        <div style="border-radius:8px;background:var(--surface);border:1px solid var(--border);padding:12px;display:flex;gap:10px;margin-bottom:8px;">
          <div style="width:8px;height:8px;border-radius:50%;background:${style.bar};margin-top:6px;flex-shrink:0;"></div>
          <div style="flex:1;min-width:0;">
            <div class="mono" style="font-size:11px;color:rgba(255,255,255,0.7);display:flex;gap:8px;flex-wrap:wrap;align-items:center;">
              <span>Wk${row.week}</span><span>${row.weekday} ${row.dateLabel}</span>
              ${row.completed ? '<span style="color:var(--success);">✓</span>' : ''}
              ${row.time ? `<span style="color:#fff;">${esc(row.time)}</span>` : ''}
              ${row.weight ? `<span style="color:#fff;">${esc(row.weight)}kg</span>` : ''}
              ${row.reps ? `<span style="color:#fff;">${esc(row.reps)}</span>` : ''}
            </div>
            <div style="font-size:14px;font-weight:500;margin-top:2px;">${esc(row.title)}</div>
            ${row.comment ? `<div style="font-size:13px;color:rgba(255,255,255,0.7);margin-top:2px;">${esc(row.comment)}</div>` : ''}
          </div>
        </div>
      `;
    });
  }
  html += `</div>`;
  return html;
}

function drawLineChart(canvasId, points, color) {
  const canvas = document.getElementById(canvasId);
  if (!canvas || points.length === 0) return;
  const ctx = canvas.getContext("2d");
  const w = canvas.width = canvas.offsetWidth * 2;
  const h = canvas.height = 140 * 2;
  ctx.scale(1,1);
  ctx.clearRect(0,0,w,h);
  const pad = 30 * 2;
  const xs = points.map(p => p.week);
  const ys = points.map(p => p.value);
  const minX = Math.min(...xs), maxX = Math.max(...xs);
  const minY = Math.min(...ys) - 1, maxY = Math.max(...ys) + 1;
  const xScale = x => pad + (maxX===minX ? 0 : (x-minX)/(maxX-minX)) * (w - pad*1.3);
  const yScale = y => (h-pad) - ((y-minY)/(maxY-minY||1)) * (h - pad*1.6);

  ctx.strokeStyle = "#232A30"; ctx.lineWidth = 1;
  for (let i=0;i<=3;i++) {
    const yy = pad*0.6 + i*((h-pad*1.6)/3);
    ctx.beginPath(); ctx.moveTo(pad*0.7, yy); ctx.lineTo(w-10, yy); ctx.stroke();
  }

  ctx.strokeStyle = color; ctx.lineWidth = 3; ctx.lineJoin = "round";
  ctx.beginPath();
  points.forEach((p,idx) => { const x=xScale(p.week), y=yScale(p.value); idx===0?ctx.moveTo(x,y):ctx.lineTo(x,y); });
  ctx.stroke();

  ctx.fillStyle = color;
  points.forEach(p => { const x=xScale(p.week), y=yScale(p.value); ctx.beginPath(); ctx.arc(x,y,5,0,Math.PI*2); ctx.fill(); });

  ctx.fillStyle = "rgba(255,255,255,0.6)"; ctx.font = "20px IBM Plex Mono"; ctx.textAlign = "center";
  points.forEach(p => { ctx.fillText("Wk"+p.week, xScale(p.week), h-8); });
}

function renderReviewTab() {
  const weightData = [], vo2Data = [];
  for (let w=1; w<=TOTAL_WEEKS; w++) {
    const m = state.metrics[w];
    if (m?.bodyweight) weightData.push({week:w, value: parseFloat(m.bodyweight)});
    if (m?.vo2max) vo2Data.push({week:w, value: parseFloat(m.vo2max)});
  }

  let recapRows = "";
  for (let w = currentWeek; w >= 1; w--) {
    const wd = SCHEDULE[w-1];
    const relevant = wd.days.filter(d => d.type !== "rest");
    const done = wd.days.filter((d,i) => d.type !== "rest" && state.logs[keyFor(w,i)]?.completed).length;
    const m = state.metrics[w] || {};
    if (done===0 && !m.bodyweight && !m.vo2max) continue;
    recapRows += `
      <div style="display:flex;align-items:center;justify-content:space-between;font-size:13px;border-top:1px solid var(--border);padding-top:8px;margin-top:8px;">
        <span class="mono" style="color:rgba(255,255,255,0.7);font-size:11px;">Wk${w} · ${wd.days[0].dateLabel}</span>
        <span>${done}/${relevant.length} sessions</span>
        <span class="mono" style="color:rgba(255,255,255,0.7);font-size:11px;">${m.bodyweight?m.bodyweight+'kg':'—'} / ${m.vo2max?m.vo2max+' VO2':'—'}</span>
        <button onclick="copyWeekSummary(${w})" style="color:rgba(255,255,255,0.5);">${copiedKey===w?'✓':'📋'}</button>
      </div>
    `;
  }

  return `
    <div style="padding:16px;">
      <div class="checkin-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span>⚖️</span><span style="font-size:14px;font-weight:500;">Bodyweight</span></div>
        ${weightData.length===0 ? '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:24px 0;font-size:14px;">Log bodyweight in the weekly check-in to see your trend here.</div>' : '<canvas id="weightChart" style="width:100%;height:140px;"></canvas>'}
      </div>
      <div class="checkin-card">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px;"><span>🫁</span><span style="font-size:14px;font-weight:500;">VO2 Max</span></div>
        ${vo2Data.length===0 ? '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:24px 0;font-size:14px;">Log VO2 max in the weekly check-in to see your trend here.</div>' : '<canvas id="vo2Chart" style="width:100%;height:140px;"></canvas>'}
      </div>
      <div class="checkin-card">
        <div style="font-size:14px;font-weight:500;margin-bottom:4px;">Weekly Recap</div>
        ${recapRows || '<div style="text-align:center;color:rgba(255,255,255,0.5);padding:16px 0;font-size:13px;">No sessions logged yet.</div>'}
      </div>
    </div>
  `;
}

function render() {
  const app = document.getElementById("app");
  let body = "";
  if (currentTab === "week") body = renderWeekTab();
  else if (currentTab === "history") body = renderHistoryTab();
  else body = renderReviewTab();

  app.innerHTML = renderHeader() + renderTabs() + body;

  if (currentTab === "review") {
    const weightData = [], vo2Data = [];
    for (let w=1; w<=TOTAL_WEEKS; w++) {
      const m = state.metrics[w];
      if (m?.bodyweight) weightData.push({week:w, value: parseFloat(m.bodyweight)});
      if (m?.vo2max) vo2Data.push({week:w, value: parseFloat(m.vo2max)});
    }
    if (weightData.length) drawLineChart("weightChart", weightData, "#3E7CB1");
    if (vo2Data.length) drawLineChart("vo2Chart", vo2Data, "#E0432B");
  }
}

loadState();
render();
</script>
</body>
</html>
